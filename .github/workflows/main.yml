name: Build Minecraft Server and Velocity
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # Create organized directory structure
      - name: Create directories
        run: |
          mkdir -p paper_server/plugins
          mkdir -p velocity_proxy/plugins

      # Download core files
      - name: Download PaperMC
        run: wget -O paper_server/paper.jar "https://fill-data.papermc.io/v1/objects/d30fae0c74092b10855f0412ca6b265c60301a013d34bc28a2a41bf5682dd80b/paper-26.1.2-69.jar"

      - name: Download Velocity
        run: wget -O velocity_proxy/velocity.jar "https://fill-data.papermc.io/v1/objects/fb599cbda6a6d01decce5e281f71f51cae7cacffcfafca32a09601f407b0583e/velocity-3.4.0-566.jar"

      # Setup PaperMC: EULA, first run, add plugin, and second run with custom console commands
      - name: Setup PaperMC (EULA, Plugins, and Init)
        working-directory: paper_server
        run: |
          # Initial run to generate eula.txt
          java -jar paper.jar --nogui || true
          # Accept EULA
          sed -i 's/eula=false/eula=true/' eula.txt
          
          # Run to download initial libraries/dependencies
          timeout 120s java -jar paper.jar --nogui || true
          
          # Download and install AuthMe plugin
          wget -O plugins/AuthMe-6.0.0-Paper.jar "https://github.com/AuthMe/AuthMeReloaded/releases/download/6.0.0/AuthMe-6.0.0-Paper.jar"
          
          # Download and install additional plugins
          wget -O plugins/EssentialsX-2.22.0.jar "https://github.com/EssentialsX/Essentials/releases/download/2.22.0/EssentialsX-2.22.0.jar"
          wget -O plugins/VaultUnlocked-2.19.1.jar "https://cdn.modrinth.com/data/ayRaM8J7/versions/ypDodbNn/VaultUnlocked-2.19.1.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/PlayerPoints-3.3.4.jar "https://cdn.modrinth.com/data/bPX4jcVd/versions/5fiRT40B/PlayerPoints-3.3.4.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/PlaceholderAPI-2.12.2.jar "https://cdn.modrinth.com/data/lKEzGugV/versions/UmbIiI5H/PlaceholderAPI-2.12.2.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/DecentHolograms-2.9.10.jar "https://cdn.modrinth.com/data/w02MKsTg/versions/t9gURTWO/DecentHolograms-2.9.10.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/ajLeaderboards-2.11.0.jar "https://cdn.modrinth.com/data/C9BKEl8Y/versions/6nwpDKtA/ajLeaderboards-2.11.0.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/FancyNpcs-2.10.1.jar "https://cdn.modrinth.com/data/EeyAn23L/versions/x31qn7aH/FancyNpcs-2.10.1.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          wget -O plugins/LuckPerms-Bukkit-5.5.53.jar "https://cdn.modrinth.com/data/Vebnzrzj/versions/MBSY8toc/LuckPerms-Bukkit-5.5.53.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=paper"
          
          # Run the server, wait 120s, execute PAPI command, wait 60s, then stop gracefully
          (sleep 120 && echo "papi ecloud download Statistic" && sleep 60 && echo "stop") | java -jar paper.jar --nogui

      # Setup Velocity: Run to generate config files
      - name: Setup Velocity
        working-directory: velocity_proxy
        run: |
          # Generate initial config
          timeout 60s java -jar velocity.jar || true
          
          # Download and install LuckPerms
          wget -O plugins/LuckPerms-Velocity-5.5.53.jar "https://cdn.modrinth.com/data/Vebnzrzj/versions/BmxJvHsa/LuckPerms-Velocity-5.5.53.jar?mr_download_reason=standalone&mr_game_version=26.1.2&mr_loader=velocity"
          
          # Run to initialize plugin
          timeout 60s java -jar velocity.jar || true

      # High-efficiency compression (Output file is created in the parent directory to prevent self-reference errors)
      - name: Compress Everything (Tar XZ)
        run: |
          tar -cJf ../minecraft_velocity_package.tar.xz --exclude=".git" --exclude=".github" .

      # Upload the package from the parent directory to GitHub releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: minecraft-network-build-${{ github.run_id }}
          name: "Minecraft Server & Velocity Proxy Build - ${{ github.run_id }}"
          files: ../minecraft_velocity_package.tar.xz
